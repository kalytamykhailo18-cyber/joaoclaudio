# /etc/nginx/sites-available/joaoclaudiomiranda.conf
# Reverse proxy: joaoclaudiomiranda.com -> Next.js app on 127.0.0.1:3000
# Enable:  ln -s /etc/nginx/sites-available/joaoclaudiomiranda.conf /etc/nginx/sites-enabled/
# TLS is added automatically by:  certbot --nginx -d joaoclaudiomiranda.com -d www.joaoclaudiomiranda.com

server {
    listen 80;
    listen [::]:80;
    server_name joaoclaudiomiranda.com www.joaoclaudiomiranda.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }

    # Cache Next.js static assets aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
